---
personas:
  - name: sentinel
    description: Security domain expert — OWASP Top 10 and CWE mitigations
    domains:
      - name: injection
        category: security
        patterns:
          - id: CWE-89
            name: SQL Injection
            mitigations:
              - Use parameterised queries (never string concatenation)
              - Apply allowlist validation on all user inputs
              - 'Run SELECT least privilege — deny exec on data user'
          - id: CWE-78
            name: OS Command Injection
            mitigations:
              - Avoid shell invocation — use direct API calls
              - 'If shell required: strict allowlist of safe chars + no shell metacharacters'
              - Prefer execve() over system()/popen()
          - id: CWE-94
            name: Code Injection
            mitigations:
              - Never eval() or exec() untrusted input
              - Sandboxing for plugins / third-party code
              - 'Static analysis: detect eval/exec patterns'

      - name: path_traversal
        category: security
        patterns:
          - id: CWE-22
            name: Path Traversal
            mitigations:
              - 'Validate input: reject if contains ".."'
              - 'Resolve path then check it is within intended root'
              - Use realpath() or Path::resolve() — not just string checks
          - id: CWE-36
            name: Absolute Path Traversal
            mitigations:
              - Canonicalise path before any validation
              - Confirm resolved path starts with intended base directory
              - Strip null bytes before processing

      - name: auth_bypass
        category: security
        patterns:
          - id: CWE-287
            name: Improper Authentication
            mitigations:
              - Require explicit authentication on every sensitive operation
              - Never trust session state alone — re-validate on privilege escalation
              - Time-out sessions; enforce MFA on sensitive actions
          - id: CWE-798
            name: Use of Hard-coded Credentials
            mitigations:
              - Never commit credentials — use environment variables or secrets manager
              - 'Rotate keys: automatic rotation via secret manager'
              - 'Audit: detect credential patterns in code with CI scan'

      - name: sensitive_data
        category: security
        patterns:
          - id: CWE-312
            name: Cleartext Storage of Sensitive Data
            mitigations:
              - Encrypt at rest — never store plaintext secrets
              - Use key management service (AWS KMS / HashiCorp Vault)
              - TLS for all data in transit
          - id: CWE-359
            name: Exposure of Sensitive Information to Unauthorized Actor
            mitigations:
              - Return only fields the caller is authorised to see
              - Redact PII from logs and error messages
              - Minimize API response surface — avoid over-fetching

      - name: xss
        category: security
        patterns:
          - id: CWE-79
            name: Cross-site Scripting (XSS)
            mitigations:
              - 'Context-aware output encoding — HTML, URL, JS, CSS'
              - Content-Security-Policy header to block inline scripts
              - HTTPOnly and Secure flags on session cookies

      - name: ssrf
        category: security
        patterns:
          - id: CWE-918
            name: Server-Side Request Forgery (SSRF)
            mitigations:
              - URL validation against allowlist of permitted hosts/ports
              - Block private IP ranges (10.x, 192.168.x, 169.254.x, 127.x) for fetched URLs
              - 'Resolver: use IDN-safe parser to detect homograph attacks'

      - name: iac_misconfig
        category: security
        patterns:
          - id: CWE-2
            name: Security Misconfiguration
            mitigations:
              - Automated scanning (trivy, Prowler) in CI pipeline
              - 'Principle of least privilege: IAM, network, container'
              - Immutable infrastructure — no manual config on running systems
              - Regularly patch and rotate; automated compliance checks