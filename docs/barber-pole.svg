<svg xmlns="http://www.w3.org/2000/svg" width="80" height="200" viewBox="0 0 80 200">
  <defs>
    <clipPath id="pole-clip">
      <rect x="20" y="20" width="40" height="160" rx="4"/>
    </clipPath>
    <style>
      .stripes {
        animation: spin 1.8s linear infinite;
      }
      @keyframes spin {
        from { transform: translateY(0); }
        to   { transform: translateY(60px); }
      }
    </style>
  </defs>

  <!-- pole body background -->
  <rect x="20" y="20" width="40" height="160" rx="4" fill="#f0f0f0"/>

  <!-- animated stripes inside clip -->
  <g clip-path="url(#pole-clip)">
    <g class="stripes">
      <!-- one full period = 60px, start -60 so loop is seamless -->
      <!-- red stripe -->
      <polygon points="20,-60 60,-60 60,-40 20,-20" fill="#cc2222"/>
      <polygon points="20,-20 60,-40 60,-20 20,0"  fill="#ffffff"/>
      <polygon points="20,0  60,-20 60,0  20,20"  fill="#1a3a8a"/>
      <!-- repeat period 1 -->
      <polygon points="20,0  60,0  60,20 20,40"  fill="#cc2222"/>
      <polygon points="20,40 60,20 60,40 20,60"  fill="#ffffff"/>
      <polygon points="20,60 60,40 60,60 20,80"  fill="#1a3a8a"/>
      <!-- repeat period 2 -->
      <polygon points="20,60  60,60  60,80  20,100" fill="#cc2222"/>
      <polygon points="20,100 60,80  60,100 20,120" fill="#ffffff"/>
      <polygon points="20,120 60,100 60,120 20,140" fill="#1a3a8a"/>
      <!-- repeat period 3 -->
      <polygon points="20,120 60,120 60,140 20,160" fill="#cc2222"/>
      <polygon points="20,160 60,140 60,160 20,180" fill="#ffffff"/>
      <polygon points="20,180 60,160 60,180 20,200" fill="#1a3a8a"/>
      <!-- repeat period 4 (overflow for seamless) -->
      <polygon points="20,180 60,180 60,200 20,220" fill="#cc2222"/>
      <polygon points="20,220 60,200 60,220 20,240" fill="#ffffff"/>
    </g>
  </g>

  <!-- top cap -->
  <rect x="14" y="10" width="52" height="14" rx="4" fill="#888888"/>
  <!-- bottom cap -->
  <rect x="14" y="176" width="52" height="14" rx="4" fill="#888888"/>

  <!-- pole outline -->
  <rect x="20" y="20" width="40" height="160" rx="4" fill="none" stroke="#aaaaaa" stroke-width="1"/>
</svg>
